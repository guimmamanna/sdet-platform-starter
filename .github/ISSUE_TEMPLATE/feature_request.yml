name: Feature request
description: Propose an enhancement to the platform, tests, or delivery workflow.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What engineering or quality gap does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred implementation and expected outcomes.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and tradeoffs
      description: Call out complexity, maintenance cost, or potential regression areas.

